<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLCC Display Layar 2</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden; 
        }

        /* Kontainer utama tetap memenuhi layar penuh */
        .fullscreen-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* TRIK UTAMA: Memaksa area video berukuran Full HD 1080p murni */
        .video-wrapper {
            position: relative;
            width: 1920px;
            height: 1080px;
            transform-origin: center center; /* Skala menyusut tepat di tengah */
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- === KONTEN UTAMA === -->
<div id="mainContent" class="fullscreen-container">
    <!-- Ukuran pembungkus ini akan disesuaikan secara dinamis oleh JavaScript di bawah -->
    <div id="playerWrapper" class="video-wrapper">
        <div id="player2"></div>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
    const SUPABASE_URL = "https://zrycfquuqcygftngkwku.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable_D7uzajVgAFW_8EC5hQp57g_IBiyAHYO"; 
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let player2;
    let currentVideoId2 = 'bRNlrdfKNd4'; 

    // Fungsi menghitung rasio agar ukuran 1920x1080 pas di monitor resolusi berapapun
    function resizeVideoWrapper() {
        const wrapper = document.getElementById('playerWrapper');
        if (!wrapper) return;
        
        const windowWidth = window.innerWidth;
        const windowHeight = window.innerHeight;
        
        // Hitung skala rasio terbaik
        const scaleX = windowWidth / 1920;
        const scaleY = windowHeight / 1080;
        const scale = Math.max(scaleX, scaleY); // Gunakan Max untuk memenuhi layar (crop sedikit jika perlu)
        
        wrapper.style.transform = `scale(${scale})`;
    }

    window.onload = function() {
        initializeApplication();
        resizeVideoWrapper();
    };

    window.onresize = function() {
        resizeVideoWrapper();
    };

    async function initializeApplication() {
        try {
            const res2 = await supabaseClient
                .from('video_settings')
                .select('video_id')
                .eq('id', 2)
                .maybeSingle();

            if (res2.data && res2.data.video_id && res2.data.video_id !== 'contoh') {
                currentVideoId2 = res2.data.video_id;
            }

        } catch (err) {
            console.log("Membaca konfigurasi sinkronisasi cloud terhambat:", err);
        } finally {
            if (typeof YT !== 'undefined' && YT.loaded) {
                onYouTubeIframeAPIReady();
            }
        }

        supabaseClient
            .channel('schema-db-changes')
            .on(
                'postgres_changes',
                { event: '*', schema: 'public', table: 'video_settings' },
                (payload) => {
                    if (payload.new && payload.new.id === 2) {
                        currentVideoId2 = payload.new.video_id;
                        setupSinglePlayer(currentVideoId2);
                    }
                }
            )
            .subscribe();
    }

    function onYouTubeIframeAPIReady() {
        setupSinglePlayer(currentVideoId2);
    }

    function forceDisableCC(targetPlayer) {
        if (!targetPlayer) return;
        try {
            if (typeof targetPlayer.unloadModule === 'function') {
                targetPlayer.unloadModule('captions');
            }
            if (typeof targetPlayer.setOption === 'function') {
                targetPlayer.setOption('captions', 'track', {});
            }
        } catch(e) {
            console.log("CC Unload skip:", e);
        }
    }

    function aggressiveForce1080p(targetPlayer) {
        if (!targetPlayer) return;
        try {
            if (typeof targetPlayer.getAvailableQualityLevels === 'function') {
                const qualities = targetPlayer.getAvailableQualityLevels();
                if (qualities.includes('hd1080')) {
                    targetPlayer.setPlaybackQuality('hd1080');
                }
            }
            if (typeof targetPlayer.setOption === 'function') {
                targetPlayer.setOption('playbackQuality', 'hd1080');
                targetPlayer.setOption('vq', 'hd1080');
            }
            if (targetPlayer.getPlaybackQuality() !== 'hd1080' && typeof targetPlayer.setPlaybackQualityRange === 'function') {
                targetPlayer.setPlaybackQualityRange('hd1080', 'hd1080');
            }
        } catch(e) {
            console.log("Gagal menembus proteksi kualitas:", e);
        }
    }

    function setupSinglePlayer(videoId) {
        if (!videoId) return;

        if (player2 && typeof player2.loadVideoById === 'function') {
            player2.loadVideoById({
                videoId: videoId,
                startSeconds: 0,
                suggestedQuality: 'hd1080'
            });
            
            let retryCount = 0;
            const qualityInterval = setInterval(() => {
                aggressiveForce1080p(player2);
                forceDisableCC(player2);
                retryCount++;
                if (retryCount > 10) clearInterval(qualityInterval); 
            }, 500);

            setTimeout(() => {
                player2.mute();
                player2.playVideo();
            }, 500);
        } else {
            player2 = new YT.Player('player2', {
                height: '100%',
                width: '100%',
                videoId: videoId,
                playerVars: {
                    'autoplay': 1,
                    'loop': 1,
                    'playlist': videoId,
                    'mute': 1,          
                    'controls': 1,      
                    'rel': 0,
                    'modestbranding': 1,
                    'fs': 1,            
                    'iv_load_policy': 3,
                    'vq': 'hd1080',      
                    'cc_load_policy': 0, 
                    'cc_lang_pref': 'none'
                },
                events: {
                    'onReady': (event) => {
                        event.target.mute();
                        event.target.playVideo();
                        
                        let retryCount = 0;
                        const readyInterval = setInterval(() => {
                            aggressiveForce1080p(event.target);
                            forceDisableCC(event.target);
                            retryCount++;
                            if (retryCount > 10) clearInterval(readyInterval);
                        }, 500);

                        setTimeout(() => {
                            if (event.target.getPlayerState() !== 1) event.target.playVideo();
                        }, 1000);
                    },
                    'onStateChange': (event) => {
                        if (event.data === YT.PlayerState.PLAYING) {
                            aggressiveForce1080p(event.target);
                            forceDisableCC(event.target);
                        }
                        if (event.data === YT.PlayerState.ENDED) {
                            event.target.playVideo();
                        }
                    }
                }
            });
        }
    }
</script>

</body>
</html>
