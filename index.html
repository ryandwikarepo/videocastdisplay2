<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLCC Display Layar 2</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #fff;
            overflow: hidden; 
        }

        /* === STYLE KONTEN UTAMA === */
        .fullscreen-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            z-index: 10;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        /* Trik memotong area hitam atas-bawah bawaan YouTube agar terlihat benar-benar bersih */
        .video-wrapper iframe {
            position: absolute;
            top: -60px;
            left: 0;
            width: 100%;
            height: calc(100% + 120px);
            border: none;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- === KONTEN UTAMA === -->
<div id="mainContent" class="fullscreen-container">
    <div id="playerWrapper" class="video-wrapper">
        <!-- Kontainer dinamis, Iframe akan digenerate dari JS untuk membersihkan cache resolusi -->
        <div id="playerContainer"></div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://zrycfquuqcygftngkwku.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable_D7uzajVgAFW_8EC5hQp57g_IBiyAHYO"; 
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentVideoId2 = 'bRNlrdfKNd4'; 

    window.onload = function() {
        initializeApplication();
    };

    async function initializeApplication() {
        try {
            const res2 = await supabaseClient
                .from('video_settings')
                .select('video_id')
                .eq('id', 2)
                .maybeSingle();

            if (res2.data && res2.data.video_id && res2.data.video_id !== 'contoh') {
                currentVideoId2 = res2.data.video_id;
            }
        } catch (err) {
            console.log("Membaca konfigurasi sinkronisasi cloud terhambat:", err);
        } finally {
            renderHardcodedPlayer(currentVideoId2);
        }

        // Realtime Sync
        supabaseClient
            .channel('schema-db-changes')
            .on(
                'postgres_changes',
                { event: '*', schema: 'public', table: 'video_settings' },
                (payload) => {
                    if (payload.new && payload.new.id === 2) {
                        currentVideoId2 = payload.new.video_id;
                        renderHardcodedPlayer(currentVideoId2);
                    }
                }
            )
            .subscribe();
    }

    // BYPASS METODE: Menghancurkan DOM lama dan menyuntikkan manifes paksa lewat URL Embed
    function renderHardcodedPlayer(videoId) {
        if (!videoId) return;

        const container = document.getElementById('playerContainer');
        if (!container) return;

        // Kosongkan kontainer untuk membuang memori "Auto Resolution" bawaan sesi sebelumnya
        container.innerHTML = '';

        // Membuat element Iframe murni dengan query string bypass bandwidth cerdas
        const iframe = document.createElement('iframe');
        iframe.id = "player2";
        iframe.width = "100%";
        iframe.height = "100%";
        iframe.allow = "autoplay; fullscreen";
        
        // Menggunakan kombinasi parameter vq=hd1080, playlist pembatas, dan parameter HTML5 paksa
        iframe.src = `https://www.youtube.com/embed/${videoId}?` + 
                     `autoplay=1` +
                     `&loop=1` +
                     `&playlist=${videoId}` +
                     `&mute=1` +
                     `&controls=1` +
                     `&fs=1` +             // Fullscreen bawaan diaktifkan
                     `&rel=0` +
                     `&modestbranding=1` +
                     `&iv_load_policy=3` +
                     `&vq=hd1080` +        // Injeksi parameter kualitas dasar tingkat tinggi
                     `&html5=1` +          // Paksa engine HTML5 player murni
                     `&cc_load_policy=0`;

        container.appendChild(iframe);
    }
</script>

</body>
</html>
